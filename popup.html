<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>D2L → Notion</h1>

    <div id="main-view">
      <button id="sync-btn" class="primary-btn">Sync Assignments</button>
      <div id="status" class="status"></div>
      <div id="results" class="results"></div>
      <button id="settings-btn" class="secondary-btn">⚙️ Settings</button>
    </div>

    <div id="settings-view" class="hidden">
      <h2>Settings</h2>
      <label>
        Notion API Token
        <input type="password" id="notion-token" placeholder="secret_...">
      </label>
      <label>
        Notion Database ID
        <input type="text" id="database-id" placeholder="32-char ID">
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="sync-description">
        Include Description field
      </label>
      <label>
        Sync window
        <select id="sync-window">
          <option value="2w">Next 2 weeks</option>
          <option value="1m">Next month</option>
          <option value="3m" selected>Next 3 months</option>
          <option value="6m">Next 6 months</option>
          <option value="1y">Next 12 months</option>
        </select>
      </label>
      <div class="btn-row">
        <button id="save-btn" class="primary-btn">Save</button>
        <button id="back-btn" class="secondary-btn">Back</button>
      </div>
      <button id="test-btn" class="secondary-btn">🔌 Test Notion Connection</button>
      <div id="settings-status" class="status"></div>
      <p class="help">
        <strong>How to get these:</strong><br>
        1. Go to <a href="https://www.notion.so/my-integrations" target="_blank">notion.so/my-integrations</a> and create an integration to get your token.<br>
        2. Open your Notion database, click "..." → "Connections" → select your integration.<br>
        3. Copy the database ID from the URL (the 32-char string before the "?v=").
      </p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
